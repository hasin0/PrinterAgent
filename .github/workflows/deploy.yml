name: Deploy PrinterAgent

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VENV_DIR: C:\Users\Admin\Desktop\PrinterAgent\venv
  HASH_FILE: C:\Users\Admin\Desktop\PrinterAgent\venv\.requirement.hash

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Latest Code
        uses: actions/checkout@v4

      - name: Install Dependencies (only if changed)
        shell: powershell
        run: |

          if (-not (Test-Path "requirement.txt")) {
            Write-Error "requirement.txt not found in repo root."
            exit 1
          }

          $currentHash = (Get-FileHash "requirement.txt" -Algorithm SHA256).Hash

          $storedHash = ""
          if (Test-Path "$env:HASH_FILE") {
            $storedHash = Get-Content "$env:HASH_FILE" -Raw
          }

          $storedHash = $storedHash.Trim()

          $venvPython = "$env:VENV_DIR\Scripts\python.exe"

          if ((Test-Path $venvPython) -and ($currentHash -eq $storedHash)) {

            Write-Host "requirements unchanged - skipping install"

          } else {

            Write-Host "requirements changed - installing dependencies"

            if (-not (Test-Path $venvPython)) {
              python -m venv "$env:VENV_DIR"
            }

            & $venvPython -m pip install --upgrade pip
            & $venvPython -m pip install -r requirement.txt

            $currentHash | Out-File `
              -FilePath "$env:HASH_FILE" `
              -Encoding ascii `
              -NoNewline
          }

      - name: Verify Syntax
        shell: powershell
        run: |
          & "$env:VENV_DIR\Scripts\python.exe" -m py_compile app.py

      - name: Deployment Complete
        shell: powershell
        run: |
          Write-Host "PrinterAgent deployment completed successfully."
          Write-Host "Service restart is currently being handled manually."