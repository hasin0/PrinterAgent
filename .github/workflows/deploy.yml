name: Deploy PrinterAgent

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout Latest Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          & "C:\Users\Admin\Desktop\PrinterAgent\.venv\Scripts\python.exe" -m pip install --upgrade pip
          & "C:\Users\Admin\Desktop\PrinterAgent\.venv\Scripts\python.exe" -m pip install -r requirements.txt

      - name: Verify Syntax
        run: |
          python -m py_compile app.py

      - name: Restart PrinterAgent Service
        run: |
          nssm restart PrinterAgent