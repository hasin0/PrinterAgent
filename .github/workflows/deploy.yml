name: Deploy PrinterAgent

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed to compare with previous commit

      - name: Check if requirement changed
        id: reqcheck
        shell: pwsh
        run: |
          $changed = git diff --name-only HEAD~1 HEAD | Select-String "requirement.txt"
          if ($changed) {
              echo "changed=true" >> $env:GITHUB_OUTPUT
              Write-Host "requirement.txt changed - will install"
          } else {
              echo "changed=false" >> $env:GITHUB_OUTPUT
              Write-Host "requirement.txt unchanged - skipping install"
          }

      - name: Install dependencies (only if changed)
        if: steps.reqcheck.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      - name: Verify app syntax
        run: |
          python -m py_compile app.py

      - name: Restart PrinterAgent service
        run: |
          nssm restart PrinterAgent